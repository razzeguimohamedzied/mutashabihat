<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="متشابهات">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf7ec"/>
      <stop offset="1" stop-color="#efe6cf"/>
    </linearGradient>
  </defs>
  <!-- eight-pointed Islamic star (khatim) -->
  <g transform="translate(100 34)">
    <rect x="-13" y="-13" width="26" height="26" rx="3" fill="#d4a537"/>
    <rect x="-13" y="-13" width="26" height="26" rx="3" fill="#d4a537" transform="rotate(45)"/>
    <circle r="6" fill="#fbf7ec"/>
  </g>
  <!-- open book / mushaf -->
  <!-- left page -->
  <path d="M100 62 C78 50 50 50 26 58 L26 150 C50 142 78 142 100 154 Z" fill="url(#page)" stroke="#205d3b" stroke-width="5" stroke-linejoin="round"/>
  <!-- right page (mirror of the left = the two "matching" verses) -->
  <path d="M100 62 C122 50 150 50 174 58 L174 150 C150 142 122 142 100 154 Z" fill="url(#page)" stroke="#205d3b" stroke-width="5" stroke-linejoin="round"/>
  <!-- spine -->
  <path d="M100 62 L100 154" stroke="#205d3b" stroke-width="5" stroke-linecap="round"/>
  <!-- mirrored verse lines -->
  <g stroke="#2e8555" stroke-width="4" stroke-linecap="round">
    <path d="M40 78 H86"/>
    <path d="M114 78 H160"/>
    <path d="M40 94 H80"/>
    <path d="M120 94 H160"/>
    <path d="M40 110 H86"/>
    <path d="M114 110 H160"/>
    <path d="M40 126 H74"/>
    <path d="M126 126 H160"/>
  </g>
</svg>
